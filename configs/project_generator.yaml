# Project Generator Configuration

# Evidence search settings
search:
  max_papers: 10
  max_repos: 5
  cache_ttl_days: 30
  timeout_seconds: 30
  sources:
    - arxiv
    - semantic_scholar
    - github
    - papers_with_code

# Clarification settings
clarification:
  max_questions: 5
  interactive: true
  timeout_seconds: 300

# Proposal settings
proposals:
  num_candidates: 3
  risk_profiles:
    - conservative
    - balanced
    - aggressive

# Default constraints
defaults:
  budget_usd: 100.0
  max_time_hours: 24
  max_iterations: 10
  compute: cpu

# API rate limits
rate_limits:
  arxiv_requests_per_second: 3
  semantic_scholar_requests_per_second: 100
  github_requests_per_hour: 5000
